name: AgentOS
options:
  bundleIdPrefix: com.unstoppablecurry
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  AgentOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/AgentOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstoppablecurry.AgentOS
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: AgentOS
